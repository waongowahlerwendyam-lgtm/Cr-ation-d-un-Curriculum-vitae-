<div class="cv-builder">
  <!-- SVG d'ondulation en arrière-plan -->
  <div class="wave-background">

        <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#667eea" stop-opacity="0.3">
            <animate attributeName="stop-opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite" />
          </stop>
          <stop offset="50%" stop-color="#764ba2" stop-opacity="0.3">
            <animate attributeName="stop-opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite" begin="0.5s" />
          </stop>
          <stop offset="100%" stop-color="#ec489a" stop-opacity="0.3">
            <animate attributeName="stop-opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite" begin="1s" />
          </stop>
        </linearGradient>
      </defs>
      <path fill="url(#waveGradient)" fill-opacity="1">
        <animate 
          attributeName="d" 
          dur="20s" 
          repeatCount="indefinite"
          values="
            M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,186.7C672,192,768,224,864,234.7C960,245,1056,235,1152,213.3C1248,192,1344,160,1392,144L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z;
            
            M0,160L48,154.7C96,149,192,139,288,144C384,149,480,171,576,181.3C672,192,768,192,864,181.3C960,171,1056,149,1152,138.7C1248,128,1344,128,1392,128L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z;
            
            M0,224L48,218.7C96,213,192,203,288,202.7C384,203,480,213,576,208C672,203,768,181,864,176C960,171,1056,181,1152,186.7C1248,192,1344,192,1392,192L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z;
            
            M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,186.7C672,192,768,224,864,234.7C960,245,1056,235,1152,213.3C1248,192,1344,160,1392,144L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z
          "
        />
      </path>
    </svg>
  </div>

  <!-- Header SANS glassmorphism -->
  <header class="header">
    <div class="header-left">
      <img src="/assets/favicon_logo.png" alt="logo" class="logo-icon">
      <div class="header-title">
        <h1>Création d'un Curriculum Vitae</h1>
        <p>Créez votre CV professionnel en 5 étapes</p>
      </div>
    </div>
    <div class="header-right">
      <span class="user-name">👤 {{ userName }}</span>
      <button class="logout-btn" (click)="logout()">
        🚪 Déconnexion
      </button>
    </div>
  </header>

  <app-step-navigation
    [currentStep]="currentStep"
    [stepProgress]="stepProgress"
    [stepValidation]="stepValidation"
    (stepChange)="goToStep($event)">
  </app-step-navigation>

  <main class="main">
    <div class="step-card">
      <!-- Étape 1 -->
      <div *ngIf="currentStep === 1">
        <app-step1-infos
          [personalInfo]="cvData.personalInfo"
          (personalInfoUpdate)="updateData(1, { personalInfo: $event })">
        </app-step1-infos>
      </div>

      <!-- Étape 2 -->
      <div *ngIf="currentStep === 2">
        <app-step2-profil
          [profile]="cvData.profile"
          (profileUpdate)="onProfileUpdate($event)">
        </app-step2-profil>
      </div>

      <!-- Étape 3 -->
      <div *ngIf="currentStep === 3">
        <app-step3-experiences
          [experiences]="cvData.experiences"
          [formations]="cvData.formations"
          (experiencesChange)="updateData(3, { experiences: $event })"
          (formationsChange)="updateData(3, { formations: $event })">
        </app-step3-experiences>
      </div>

      <!-- Étape 4 -->
      <div *ngIf="currentStep === 4">
        <app-step4-competences
          [competences]="cvData.competences"
          [langues]="cvData.langues"
          [centresInteret]="cvData.centresInteret"
          [reseauxSociaux]="cvData.reseauxSociaux"
          (competencesUpdate)="updateData(4, { competences: $event })"
          (languesUpdate)="updateData(4, { langues: $event })"
          (centresInteretUpdate)="updateData(4, { centresInteret: $event })"
          (reseauxSociauxUpdate)="updateData(4, { reseauxSociaux: $event })">
        </app-step4-competences>
      </div>

      <!-- Étape 5 -->
      <div *ngIf="currentStep === 5">
        <app-step-finalisation
          [cvData]="cvData"
          (preview)="generatePreview()"
          (print)="printCV()"
          (exportJSON)="exportJSON()"
          (reset)="resetCV()"
          (stepChange)="goToStep($event)"
          (photoAdded)="onPhotoAdded($event)">
        </app-step-finalisation>
      </div>

      <!-- Navigation -->
      <div class="navigation">
        <button class="btn-secondary" (click)="previousStep()" [disabled]="currentStep === 1">
          ← Précédent
        </button>
        <button *ngIf="currentStep < totalSteps" class="btn-primary" (click)="nextStep()">
          Suivant →
        </button>
      </div>
    </div>
  </main>

  <!-- Modal Preview -->
  <div class="modal" *ngIf="showPreview" (click)="showPreview = false">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Aperçu du CV</h2>
        <button class="close" (click)="showPreview = false">✕</button>
      </div>
      <div class="modal-body">
        <iframe [srcdoc]="previewService.generateHTML(cvData)" frameborder="0"></iframe>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" (click)="printCV()">🖨️ Imprimer</button>
        <button class="btn-secondary" (click)="showPreview = false">Fermer</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Génération en cours...</p>
  </div>

  <!-- Notification -->
  <div class="notification" *ngIf="notification" [class]="notification.type">
    {{ notification.message }}
  </div>

  <!-- Footer -->
  <app-footer></app-footer>
</div>
